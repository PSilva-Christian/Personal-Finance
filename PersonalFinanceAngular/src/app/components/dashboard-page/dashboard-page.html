<div class="container-fluid p-4">
  <div class="row dashboard-container rounded-5 shadow-lg">

    <aside class="sidebar col-auto d-flex flex-column p-4">
      <div class="text-center mb-5 px-5">
        <img class="rounded-circle border border-3 border-opacity-25 border-light shadow"
             src="https://cdn-icons-png.flaticon.com/512/9308/9308008.png"
             alt="Profile" width="80">
        <h6 class="text-light mt-3 opacity-75">Admin Account</h6>
      </div>

      <nav class="nav flex-column fw-bold">
        <a class="nav-link-custom" href="#"><i class="bi bi-person"></i> Profile</a>
        <a class="nav-link-custom active" href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link-custom" (click)="navigateToUpdates()"><i class="bi bi-arrow-repeat"></i> Update</a>
        <a class="nav-link-custom" href="#"><i class="bi bi-gear"></i> Settings</a>

        <div class="mt-auto">
          <hr class="text-light opacity-25">
          <a class="nav-link-custom text-danger" href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>
      </nav>
    </aside>

    <main class="col p-5 text-light">
      <header class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold m-0">Welcome back, <span class="text-info">{{username}}</span></h2>
        <span class="badge bg-light text-dark rounded-pill px-3 py-2">April 2026</span>
      </header>

      <div class="row g-4">
        <div class="col-lg-4 col-md-5">
          <div class="d-flex flex-column gap-3">

            <div class="finance-card p-4 shadow-sm">
              <small class="metric-label">Total Balance</small>
              <h3 class="fw-bold mb-0">R$ 5.000,00</h3>
            </div>

            <div class="finance-card p-4 shadow-sm">
              <small class="metric-label">Total Invested</small>
              <h3 class="fw-bold mb-0 text-info">R$ 25.000,00</h3>
            </div>

            <div class="finance-card p-4 shadow-sm border-start border-4 border-success">
              <small class="metric-label">Monthly Budget</small>
              <h3 class="fw-bold mb-0">R$ 3.000,00</h3>
            </div>

            <div class="finance-card p-4 shadow-sm">
              <small class="metric-label">Earnings (This Month)</small>
              <h3 class="fw-bold mb-0 text-success">+ R$ 527,70</h3>
            </div>

          </div>
        </div>

        <div class="col-lg-8 col-md-7">
          <div class="chart-placeholder h-100 p-4">
            <img class="img-fluid rounded-4 shadow"
                 src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fwww.kandasoft.com%2Fimages%2F2024%2F05%2FChart-7.png"
                 alt="Financial Chart" style="max-height: 450px; width: 100%; object-fit: cover;">
          </div>
        </div>
      </div>
    </main>

  </div>
</div>

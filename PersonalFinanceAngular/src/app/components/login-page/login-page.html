
<h1 class="container text-center mt-3 fw-bold fs-1 opacity-70">Welcome Back</h1>
<form [formGroup]="LoginForm" (submit)="loginUser()" class="container rounded rounded-5 mt-4 col-6 shadow-lg opacity-75 border-2">
    <div class="text-center">

        <h2 class="container text-light fw-bold pt-4 fs-2">Sign-in</h2>

        <div class="container pt-3 text-start">
            <div class="ps-5 pe-5 me-5 ms-5">
                <label for="email" class="form-label text-light pb-1 ps-1">E-mail</label>
                <input formControlName="email" id="email" type="email" class="form-control opacity-75 p-3 rounded-4" placeholder="Enter email">
                @if (LoginForm.get('email')?.invalid && LoginForm.get('email')?.touched) {
                  <small class="alertInputs">• E-mail must be valid</small>
                }
            </div>
        </div>

        <div class="container pt-3 text-start">
            <div class="ps-5 pe-5 me-5 ms-5">
                <label for="password" class="form-label text-light pb-1 ps-1">Password</label>
                <input formControlName="password" id="password" type="password" class="form-control opacity-75 p-3 rounded-4" placeholder="Enter password" required>
                @if (LoginForm.get('password')?.invalid && LoginForm.get('password')?.touched) {
                  <small class="alertInputs">• Password must be 8-12 characters.</small>
                }
            </div>
        </div>

        <div class="container pt-3">
            <button [disabled]="!LoginForm.valid" class="col-6 border-2 btn btn-lg rounded-4 mt-4 opacity-75 fw-bolder shadow-lg text-light">Sign-in</button>

            <div class="divider fw-bolder"><span>or</span></div>

            <a routerLink="/signup" class="col-6 border-2 btn btn-lg rounded-4 mt-2 mb-4 opacity-75 fw-bolder shadow-lg text-light">Sign-up</a>

        </div>


    </div>

</form>
